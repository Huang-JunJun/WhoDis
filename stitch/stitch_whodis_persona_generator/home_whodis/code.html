</section>

<div class="bg-surface-container-lowest rounded-xl p-lg border border-surface-variant shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex flex-col items-center text-center">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
