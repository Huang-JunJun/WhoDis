<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

<body class="min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 shadow-sm shadow-slate-200/50 dark:shadow-none">
<div class="flex justify-between items-center h-16 px-6 max-w-[800px] mx-auto">
<div class="text-lg font-bold tracking-tighter text-slate-900 dark:text-white font-sans text-sm font-medium tracking-tight">WhoDis</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-container-max mx-auto px-gutter pt-32 pb-xl flex flex-col relative z-10">
<!-- Context Header -->
<div class="flex justify-between items-end border-b border-outline-variant pb-sm mb-xl">
<div class="font-label text-label text-on-surface-variant tracking-widest uppercase">当前阶段：性格外显层</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">已完成 6 道选择</div>
</div>
<!-- Question Section -->
<div class="mb-lg">
<h1 class="font-h2 text-h2 text-on-surface">你觉得自己平时更接近哪一种人？</h1>
</div>
<!-- Options Grid -->
<div class="flex flex-col gap-sm mb-xl">
<!-- Selected Option -->
<button class="w-full text-left p-md bg-secondary-container border border-primary/30 rounded-xl shadow-sm transition-all flex items-start gap-md group">
<div class="font-label text-label text-primary mt-1">A</div>
<div class="font-body-md text-body-md text-on-surface">想得比较多，做决定前会反复权衡</div>
</button>
<!-- Unselected Option -->
<button class="w-full text-left p-md bg-surface-container-lowest border border-slate-100 rounded-xl hover:border-primary/20 hover:bg-surface shadow-sm transition-all flex items-start gap-md group">
<div class="font-label text-label text-on-surface-variant group-hover:text-on-surface transition-colors mt-1">B</div>
<div class="font-body-md text-body-md text-on-surface">感受比较敏锐，很容易察觉细节和氛围</div>
</button>
<!-- Unselected Option -->
<button class="w-full text-left p-md bg-surface-container-lowest border border-slate-100 rounded-xl hover:border-primary/20 hover:bg-surface shadow-sm transition-all flex items-start gap-md group">
<div class="font-label text-label text-on-surface-variant group-hover:text-on-surface transition-colors mt-1">C</div>
<div class="font-body-md text-body-md text-on-surface">表面看起来还好，但很多事习惯自己消化</div>
</button>
<!-- Unselected Option -->
<button class="w-full text-left p-md bg-surface-container-lowest border border-slate-100 rounded-xl hover:border-primary/20 hover:bg-surface shadow-sm transition-all flex items-start gap-md group">
<div class="font-label text-label text-on-surface-variant group-hover:text-on-surface transition-colors mt-1">D</div>
<div class="font-body-md text-body-md text-on-surface">目标感比较强，不太能接受自己原地踏步</div>
</button>
</div>
<!-- Primary Action -->
<div class="flex justify-end mb-xxl">
<button class="bg-primary text-on-primary px-xl py-sm rounded-full font-label text-label hover:opacity-90 transition-opacity shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex items-center gap-xs">
<span>下一题</span>
<span class="material-symbols-outlined text-[16px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div><div class="flex items-start gap-sm text-on-surface-variant max-w-[500px] mt-xl">
<span class="material-symbols-outlined text-[18px] opacity-70" data-icon="info">info</span>
<p class="font-body-sm text-body-sm leading-relaxed text-balance">完成 15 道选择后，系统会判断是否可以生成个人画像；如果信息不足，会继续深入提问。</p>
</div>
<!-- Bottom Ambient Status / Secondary Action -->
</main>
</body></html>
